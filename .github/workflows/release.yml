name: Release and Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run canonical agent check
        run: bun run ai:check

      - name: Build package
        run: bun run build

      - name: Generate release notes
        run: |
          previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)

          if [ -z "$previous_tag" ]; then
            git log --pretty=format:"- %s (%h)" "${{ github.ref_name }}" > release_notes.md
          else
            git log --pretty=format:"- %s (%h)" "$previous_tag..${{ github.ref_name }}" > release_notes.md
            printf '\n\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
              "${{ github.repository }}" "$previous_tag" "${{ github.ref_name }}" >> release_notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --provenance --access public
